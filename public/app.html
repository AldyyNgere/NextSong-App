<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextSong</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Rethink Sans", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* Safe area for iPhone */
      .safe-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>

  <body
    class="font-sans antialiased bg-[#0F172A] text-white min-h-screen flex flex-col"
  >
    <div class="flex-1 max-w-6xl mx-auto px-4 sm:px-6 py-10 w-full">
      <!-- Header -->
      <div class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-semibold tracking-tight">NextSong</h1>
        <a href="/" class="text-sm text-gray-400 hover:text-white transition">
          Back
        </a>
      </div>

      <!-- Main Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- SONG CARD -->
        <div
          id="card"
          class="lg:col-span-2 bg-white/5 backdrop-blur-xl rounded-3xl p-6 sm:p-8 flex flex-col md:flex-row gap-8 transition-all duration-500 ease-in-out opacity-100"
        >
          <!-- Cover -->
          <div
            class="w-full md:w-64 h-64 rounded-2xl overflow-hidden bg-slate-800 flex items-center justify-center"
          >
            <img
              id="cover"
              src="https://via.placeholder.com/300x300?text=Cover"
              class="w-full h-full object-cover"
              alt="cover"
            />
          </div>

          <!-- Song Info -->
          <div class="flex flex-col flex-1">
            <h2
              id="title"
              class="text-2xl sm:text-3xl font-semibold mb-2 break-words"
            >
              Click Next Song
            </h2>

            <p id="artist" class="text-indigo-400 font-medium mb-3"></p>

            <span
              id="genreBadge"
              class="inline-block text-xs bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full mb-4"
            >
            </span>

            <!-- 🔥 Lirik TANPA overflow -->
            <p
              id="lyrics"
              class="text-gray-300 text-sm sm:text-base leading-relaxed whitespace-pre-line"
            ></p>
          </div>
        </div>

        <!-- DESKTOP SIDE PANEL -->
        <div class="hidden lg:flex flex-col gap-6">
          <div class="bg-white/5 rounded-3xl p-6">
            <label class="block text-sm text-gray-400 mb-3"> Genre </label>
            <select
              id="genreSelect"
              class="w-full appearance-none bg-slate-800 border border-slate-700 text-white p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 transition"
            >
              <option value="">All Genres</option>
            </select>
          </div>

          <div class="bg-white/5 rounded-3xl p-6">
            <button
              onclick="getRandomSong()"
              class="w-full bg-indigo-500 hover:bg-indigo-600 transition p-4 rounded-2xl text-base font-semibold shadow-lg"
            >
              🎲 Next Song
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 🔥 MOBILE STICKY BOTTOM BAR -->
    <div
      class="lg:hidden fixed bottom-0 left-0 right-0 bg-[#0F172A]/95 backdrop-blur-xl border-t border-white/10 p-4 safe-bottom"
    >
      <div class="max-w-6xl mx-auto flex gap-4">
        <select
          id="genreSelectMobile"
          class="flex-1 appearance-none bg-slate-800 border border-slate-700 text-white p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 transition text-sm"
        >
          <option value="">All Genres</option>
        </select>

        <button
          onclick="getRandomSong()"
          class="bg-indigo-500 hover:bg-indigo-600 transition px-5 py-3 rounded-xl text-sm font-semibold"
        >
          Next
        </button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
